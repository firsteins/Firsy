<!DOCTYPE html>
<html>
<head>
    <title>🔥 MEU SITE</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { font-size: 80px; text-shadow: 0 0 30px #e94560; }
        p { font-size: 24px; color: #aaa; }
        .glow { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div>
        <h1 class="glow">🔥 MEU SITE</h1>
        <p>Rodando no GitHub Pages 🚀</p>
        <p style="font-size:14px;color:#555;">firsteins.github.io/Firsy</p>
    </div>
</body>
</html>
